<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="tickets-list">

  <main id="view-tickets" class="dashboard-tickets">
    <div class="tickets-app">
      <header class="tickets-header">
        <div class="tickets-header brand">
          <h1 class="tickets-title">Tickets</h1>
        </div>
        <nav class="tickets-header" aria-label="Tickets">
          <button type="button" class="btn btn-primary btn-sm" id="tickets-new">New Ticket</button>
          <button type="button" class="btn btn-secondary btn-sm" id="tickets-export-csv">Export CSV</button>
          <a href="dashboard.html" class="link-muted btn-as-link">Dashboard</a>
          <button type="button" class="btn btn-secondary btn-sm" data-theme-toggle aria-label="Switch color theme"></button>
          <button type="button" class="btn btn-secondary btn-sm" id="tickets-logout">Log out</button>
        </nav>
      </header>

      <section class="tickets-toolbar" aria-label="Filters">
        <div class="tickets-toolbar__row">
          <label class="sr-only" for="tickets-search">Search</label>
          <input id="tickets-search" class="input-slot input-slot--live" type="search" placeholder="Search tickets" autocomplete="off">
          <label class="sr-only" for="tickets-status">Status</label>
          <select id="tickets-status" class="input-slot input-slot--live" aria-label="Filter by status">
            <option value="all">All statuses</option>
            <option value="open">open</option>
            <option value="in-progress">in-progress</option>
            <option value="resolved">resolved</option>
            <option value="closed">closed</option>
          </select>
          <label class="sr-only" for="tickets-priority">Priority</label>
          <select id="tickets-priority" class="input-slot input-slot--live" aria-label="Filter by priority">
            <option value="all">All priorities</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="urgent">urgent</option>
          </select>
        </div>
        <div class="tickets-toolbar__row tickets-toolbar__row--secondary">
          <label class="sr-only" for="tickets-assignee">Assignee</label>
          <select id="tickets-assignee" class="input-slot input-slot--live" aria-label="Filter by assignee">
            <option value="all">All assignees</option>
          </select>
          <label class="sr-only" for="tickets-sort">Sort</label>
          <select id="tickets-sort" class="input-slot input-slot--live" aria-label="Sort tickets">
            <option value="newest">Newest</option>
            <option value="priority">Priority</option>
            <option value="status">Status</option>
          </select>
        </div>
      </section>

      <div id="tickets-loading" class="tickets-state tickets-state--loading" role="status" aria-live="polite" hidden>
        <span class="tickets-spinner" aria-hidden="true"></span>
        <span>Loading tickets…</span>
      </div>

      <div id="tickets-error" class="tickets-state tickets-state--error" hidden role="alert">
        <p id="tickets-error-message" class="tickets-error-text"></p>
        <button type="button" class="btn btn-primary btn-inline" id="tickets-retry">Retry</button>
      </div>

      <div id="tickets-empty" class="tickets-state tickets-state--empty" hidden>
        <p>No tickets found</p>
      </div>

      <div
        id="tickets-table-wrap"
        class="tickets-table-wrap"
        hidden
        aria-keyshortcuts="ArrowUp ArrowDown"
        aria-label="Ticket list. Use arrow keys to move between rows, Enter or Space to open."
      >
        <table class="tickets-table" id="tickets-table">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Title</th>
              <th scope="col">Customer</th>
              <th scope="col">Priority</th>
              <th scope="col">Status</th>
              <th scope="col">Assignee</th>
              <th scope="col">Created</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody id="tickets-tbody"></tbody>
        </table>
        <nav id="tickets-pagination" class="tickets-pagination" aria-label="Ticket pages">
          <button type="button" class="btn btn-secondary btn-sm tickets-page-nav" id="tickets-page-prev" disabled>Prev</button>
          <div id="tickets-page-numbers" class="tickets-page-numbers" role="group" aria-label="Page numbers"></div>
          <span id="tickets-page-summary" class="tickets-page-summary"></span>
          <button type="button" class="btn btn-secondary btn-sm tickets-page-nav" id="tickets-page-next">Next</button>
        </nav>
      </div>
    </div>
  </main>

  <template id="tpl-create-ticket">
    <form id="create-ticket-form" class="create-ticket-form" novalidate>
      <div class="create-ticket-form__fields">
        <div class="field">
          <label for="create-title">Title</label>
          <input id="create-title" name="title" type="text" autocomplete="off">
          <p class="field-error" id="create-title-err" hidden role="alert"></p>
        </div>
        <div class="field">
          <label for="create-description">Description</label>
          <textarea id="create-description" name="description" rows="4"></textarea>
          <p class="field-error" id="create-description-err" hidden role="alert"></p>
        </div>
        <div class="field">
          <label for="create-customerName">Customer name</label>
          <input id="create-customerName" name="customerName" type="text" autocomplete="name">
          <p class="field-error" id="create-customerName-err" hidden role="alert"></p>
        </div>
        <div class="field">
          <label for="create-customerEmail">Customer email</label>
          <input id="create-customerEmail" name="customerEmail" type="email" autocomplete="email">
          <p class="field-error" id="create-customerEmail-err" hidden role="alert"></p>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="create-status">Status</label>
            <select id="create-status" name="status">
              <option value="open">open</option>
              <option value="in-progress">in-progress</option>
              <option value="resolved">resolved</option>
              <option value="closed">closed</option>
            </select>
            <p class="field-error" id="create-status-err" hidden role="alert"></p>
          </div>
          <div class="field">
            <label for="create-priority">Priority</label>
            <select id="create-priority" name="priority">
              <option value="low">low</option>
              <option value="medium" selected>medium</option>
              <option value="high">high</option>
              <option value="urgent">urgent</option>
            </select>
            <p class="field-error" id="create-priority-err" hidden role="alert"></p>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="create-category">Category</label>
            <select id="create-category" name="category">
              <option value="auth">auth</option>
              <option value="billing">billing</option>
              <option value="bug">bug</option>
              <option value="feature">feature</option>
            </select>
            <p class="field-error" id="create-category-err" hidden role="alert"></p>
          </div>
          <div class="field">
            <label for="create-assignedTo">Assignee</label>
            <select id="create-assignedTo" name="assignedTo">
              <option value="">Unassigned</option>
            </select>
            <p class="field-error" id="create-assignedTo-err" hidden role="alert"></p>
          </div>
        </div>
      </div>
      <p id="create-ticket-form-error" class="form-error" role="alert" hidden></p>
      <div class="create-ticket-form__actions">
        <button type="button" class="btn btn-secondary btn-sm" id="create-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm" id="create-submit">Create</button>
      </div>
    </form>
  </template>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
