<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="dashboard">

  <main id="view-dashboard-page" class="dashboard-page">
    <div class="tickets-app">
      <header class="tickets-header">
        <div class="tickets-header brand">
          <h1 class="tickets-title">Dashboard</h1>
        </div>
        <nav class="tickets-header" aria-label="Account">
          <a href="tickets.html" class="btn btn-primary btn-sm" id="dash-view-all-tickets">View all tickets</a>
          <button type="button" class="btn btn-secondary btn-sm" data-theme-toggle aria-label="Switch color theme"></button>
          <button type="button" class="btn btn-secondary btn-sm" id="dash-logout">Log out</button>
        </nav>
      </header>

      <div id="dash-loading" class="tickets-state tickets-state--loading" role="status" aria-live="polite">
        <span class="tickets-spinner" aria-hidden="true"></span>
        <span>Loading dashboard…</span>
      </div>

      <div id="dash-error" class="tickets-state tickets-state--error" hidden role="alert">
        <p id="dash-error-message" class="tickets-error-text"></p>
        <button type="button" class="btn btn-primary btn-inline" id="dash-retry">Retry</button>
      </div>

      <div id="dash-shell" class="dash-shell" hidden>
        <section class="dash-stats" aria-label="Ticket counts">
          <article class="dash-stat-card">
            <h2 class="dash-stat-card__label">Total</h2>
            <p class="dash-stat-card__value" id="dash-stat-total">—</p>
          </article>
          <article class="dash-stat-card">
            <h2 class="dash-stat-card__label">Open</h2>
            <p class="dash-stat-card__value" id="dash-stat-open">—</p>
          </article>
          <article class="dash-stat-card">
            <h2 class="dash-stat-card__label">In progress</h2>
            <p class="dash-stat-card__value" id="dash-stat-inprogress">—</p>
          </article>
          <article class="dash-stat-card">
            <h2 class="dash-stat-card__label">Resolved</h2>
            <p class="dash-stat-card__value" id="dash-stat-resolved">—</p>
          </article>
        </section>

        <section class="dash-recent" aria-labelledby="dash-recent-heading">
          <h2 id="dash-recent-heading" class="dash-recent__title">Recent tickets</h2>
          <ul id="dash-recent-list" class="dash-recent-list"></ul>
          <p id="dash-recent-empty" class="dash-recent-empty" hidden>No tickets yet.</p>
        </section>
      </div>
    </div>
  </main>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
