<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="ticket-detail">

  <main id="view-ticket-detail" class="ticket-detail-page">
    <div class="tickets-app">
      <header class="tickets-header">
        <div class="tickets-header brand">
          <h1 class="tickets-title" id="detail-heading">Ticket</h1>
        </div>
        <nav class="tickets-header" aria-label="Ticket actions">
          <a href="tickets.html" class="link-muted btn-as-link">← Back to list</a>
          <a href="index.html" class="link-muted btn-as-link">Dashboard</a>
          <button type="button" class="btn btn-secondary btn-sm" id="detail-logout">Log out</button>
        </nav>
      </header>

      <div id="detail-loading" class="tickets-state tickets-state--loading" role="status" aria-live="polite">
        <span class="tickets-spinner" aria-hidden="true"></span>
        <span>Loading ticket…</span>
      </div>

      <div id="detail-error" class="tickets-state tickets-state--error" hidden role="alert">
        <p id="detail-error-message" class="tickets-error-text"></p>
        <button type="button" class="btn btn-primary btn-inline" id="detail-retry">Retry</button>
      </div>

      <article id="detail-shell" class="detail-shell" hidden>
        <header class="detail-hero">
          <p class="detail-meta-line"><span class="detail-label">ID</span> <span id="detail-id"></span></p>
          <h2 class="detail-title" id="detail-title"></h2>
          <div class="detail-actions" role="group" aria-label="Ticket actions">
            <button type="button" class="btn btn-secondary btn-sm" id="detail-delete">Delete ticket</button>
          </div>
        </header>

        <section class="detail-grid" aria-label="Ticket fields">
          <div class="detail-field">
            <span class="detail-label">Status</span>
            <select id="detail-status" class="input-slot input-slot--live" aria-label="Change status">
              <option value="open">open</option>
              <option value="in-progress">in-progress</option>
              <option value="resolved">resolved</option>
              <option value="closed">closed</option>
            </select>
          </div>
          <div class="detail-field">
            <span class="detail-label">Priority</span>
            <select id="detail-priority" class="input-slot input-slot--live" aria-label="Change priority">
              <option value="low">low</option>
              <option value="medium">medium</option>
              <option value="high">high</option>
              <option value="urgent">urgent</option>
            </select>
          </div>
          <div class="detail-field detail-field--wide">
            <span class="detail-label">Assignee</span>
            <select id="detail-assignee" class="input-slot input-slot--live" aria-label="Change assignee">
              <option value="">Unassigned</option>
            </select>
          </div>
          <div class="detail-field">
            <span class="detail-label">Category</span>
            <span id="detail-category" class="detail-value"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Created</span>
            <span id="detail-created" class="detail-value"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Updated</span>
            <span id="detail-updated" class="detail-value"></span>
          </div>
          <div class="detail-field detail-field--block">
            <span class="detail-label">Customer</span>
            <div id="detail-customer-name" class="detail-value"></div>
            <div id="detail-customer-email" class="detail-value detail-value--muted"></div>
          </div>
          <div class="detail-field detail-field--block detail-field--wide">
            <span class="detail-label">Description</span>
            <pre id="detail-description" class="detail-description"></pre>
          </div>
        </section>

        <section class="detail-comments" aria-labelledby="comments-heading">
          <h3 id="comments-heading" class="detail-comments__title">Comments</h3>
          <ul id="detail-comments-list" class="detail-comments-list"></ul>
          <p id="detail-comments-empty" class="detail-comments-empty" hidden>No comments yet.</p>
        </section>
      </article>
    </div>
  </main>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
