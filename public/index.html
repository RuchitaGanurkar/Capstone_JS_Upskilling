<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capstone DeskHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">

  <!-- login form skeleton -->
  <main id="view-login" class="auth-shell">
    <header class="auth-header">
      <h1>Capstone DeskHub</h1>
      <p class="auth-lead">Please sign in to continue</p>
    </header>
    <form id="login-form" class="auth-form" method="post" action="#" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="username@deskhub.in">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required placeholder="*******">
      </div>
      <p id="login-error" class="form-error" role="alert" hidden></p>

    <!-- submit button skeleton -->
      <button type="submit" class="btn btn-primary" id="login-submit">Sign in</button>
    </form>
  </main>

  <!-- dashboard skeleton -->
  <main id="view-dashboard" class="dashboard-shell" hidden>
    <h1>You're in!</h1>
    <p id="welcome-line" class="dashboard-welcome"></p>
    <div>
    <nav class="dashboard-nav" aria-label="App">
      <a href="tickets.html" class="link-primary btn-as-link" id="nav-tickets">View tickets</a>
    </nav>
    </div>
    <div class="dashboard-actions">
      <button type="button" class="btn btn-secondary" id="logout-btn">Log out</button>
    </div>
  </main>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
